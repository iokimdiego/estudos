<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .hero {
            display: block;
            position: relative;
            height: 480px;
            width: 100%;
            background: rgb(57,27,112);
            color: white;
            font-size: 48px;
        }

        .wave {
            display: block;
            position: relative;
            height: 40px;
            width: 100%;
            background: rgb(57,27,112);
            transform: scale(1, 1);
        }

        .wave:before {
            content:"";
            display: block;
            position: absolute;
            border-radius: 100%;
            width: 100%;
            height: 300px;
            background-color: white;
            right: -25%;
            top:20px;
        }
        .wave:after {
            content:"";
            display: block;
            position: absolute;
            border-radius: 100%;
            width: 100%;
            height: 300px;
            background-color: rgb(57,27,112);
            left: -25%;
            top: -240px;
        }
    </style>
</head>
<body>
    <div class="hero">Olá, mundo!</div>
    <div class="wave"></div>
</body>
</html>
